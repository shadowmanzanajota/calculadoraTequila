<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tequi-la-la TPV🍹</title>

<style>
body {
  font-family: Arial;
  background: #1e1e2f;
  color: white;
  text-align: center;
}

h1 {
  color: #00ffcc;
}

h2 {
  width: 100%;
  color: #ffaa00;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

.item {
  background: #2a2a40;
  border-radius: 10px;
  padding: 10px;
  margin: 10px;
  width: 170px;
}

.item img {
  width: 100px;
  height: 100px;
}

input {
  width: 60px;
  padding: 5px;
  text-align: center;
  margin-top: 5px;
}

.total {
  font-size: 26px;
  margin-top: 20px;
  color: #00ffcc;
}

.reset {
  background: orange;
  padding: 10px 20px;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  margin-top: 8px;
}

.btn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.plus {
  background: #00cc66;
}

.minus {
  background: #cc4444;
}

input {
  width: 50px;
  text-align: center;
}
</style>
</head>

<body>

<h1>🍹 Tequi-la-la</h1>

<div class="container" id="menu"></div>

<div class="total">
  <div id="total">Total: $0</div>
  <div id="totalAmigo" style="color:#ffcc00;">Total amigo (-25%): $0</div>
</div>
<button class="reset" onclick="resetear()">Reiniciar</button>

<script>


function cambiar(index, cantidad) {
  let input = document.getElementById(`item-${index}`);

  let valor = parseInt(input.value) || 0;
  valor += cantidad;

  if (valor < 0) valor = 0;

  input.value = valor;
  calcular();
}
  
function render() {
  const menu = document.getElementById("menu");
  menu.innerHTML = "";

  const ordenados = [
    {nombre: "Cerveza", precio: 700, img: "cerveza.png"},
    {nombre: "Burrito", precio: 900, img: "burrito.png"},
    {nombre: "Energy", precio: 650, img: "energety.png"},
    {nombre: "Golem", precio: 1100, img: "golem.png"},
    {nombre: "Ice Tea", precio: 600, img: "icetea.png"},

    {nombre: "JaggBomb", precio: 1000, img: "jaggerbomb.png"},
    {nombre: "Jagger", precio: 800, img: "jagger.png"},
    {nombre: "Jugo de frutas", precio: 600, img: "zumito.png"},
    {nombre: "Limonada", precio: 600, img: "limonada.png"},
    {nombre: "Licor afrodisiaco", precio: 900, img: "licorafrodisiaco.png"},

    {nombre: "Mojito", precio: 700, img: "mojito.png"},
    {nombre: "Nachos con guacamole", precio: 750, img: "nachos.png"},
    {nombre: "Quesadilla", precio: 800, img: "burrito.png"},
    {nombre: "Ron", precio: 900, img: "ron.png"},
    {nombre: "Cubalibre", precio: 750, img: "cubalibre.png"},

    {nombre: "Ron con frutas", precio: 800, img: "ronconfrutas.png"},
    {nombre: "Margarita", precio: 800, img: "margarita.png"},
    {nombre: "Tequila", precio: 900, img: "tequila.png"},
    {nombre: "Tequila Sunrise", precio: 800, img: "tequilasunrise.png"},
    {nombre: "Torito", precio: 1000, img: "torito.png"},

    {nombre: "Vodka", precio: 900, img: "vodka.png"},
    {nombre: "Vodka con energydrink", precio: 800, img: "vodkaenergety.png"},
    {nombre: "Vodka con frutas", precio: 800, img: "vodkaconfrutas.png"},
    {nombre: "Agua", precio: 550, img: "agua.png"},
    {nombre: "Whiskey", precio: 900, img: "whisky.png"},

    {nombre: "Whiskey con cola", precio: 800, img: "whiskyconcola.png"}
  ];

  ordenados.forEach((item, index) => {
    menu.innerHTML += `
      <div class="item">
        <img src="${item.img}">
        <h3>${item.nombre}</h3>
        <p>$${item.precio}</p>

        <div class="controls">
          <button class="btn minus" onclick="cambiar(${index}, -1)">-</button>

          <input type="number" min="0" value="0"
            id="item-${index}"
            onchange="calcular()"
            oninput="calcular()">

          <button class="btn plus" onclick="cambiar(${index}, 1)">+</button>
        </div>
      </div>
    `;
  });

  window.items = ordenados; // importante para que calcular funcione
}

function calcular() {
  let total = 0;

  items.forEach((item, index) => {
    let cantidad = parseInt(document.getElementById(`item-${index}`).value) || 0;
    total += cantidad * item.precio;
  });

  let totalAmigo = total * 0.75; // 25% descuento

  document.getElementById("total").innerText = "Total: $" + total;
  document.getElementById("totalAmigo").innerText = "Total amigo (-25%): $" + Math.round(totalAmigo);
}

function resetear() {
  items.forEach((_, index) => {
    document.getElementById(`item-${index}`).value = 0;
  });
  calcular();
}

render();
</script>

</body>
</html>
