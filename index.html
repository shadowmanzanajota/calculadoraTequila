<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tequi-la-la TPV</title>

<style>
body {
  font-family: Arial;
  background: #1e1e2f;
  color: white;
  text-align: center;
}

h1 {
  color: #00ffcc;
}

h2 {
  width: 100%;
  color: #ffaa00;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.item {
  background: #2a2a40;
  border-radius: 10px;
  padding: 10px;
  margin: 10px;
  width: 170px;
}

.item img {
  width: 100px;
  height: 100px;
}

input {
  width: 60px;
  padding: 5px;
  text-align: center;
  margin-top: 5px;
}

.total {
  font-size: 26px;
  margin-top: 20px;
  color: #00ffcc;
}

.reset {
  background: orange;
  padding: 10px 20px;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🍹 Tequi-la-la</h1>

<div class="container" id="menu"></div>

<div class="total" id="total">Total: $0</div>
<button class="reset" onclick="resetear()">Reiniciar</button>

<script>
const items = [

  // Bebidas
  {nombre: "Agua", precio: 550},
  {nombre: "Jugo de frutas", precio: 600},
  {nombre: "Limonada", precio: 650},
  {nombre: "Ice Tea", precio: 700},
  {nombre: "Energy", precio: 750},

  // Comida
  {nombre: "Nachos con guacamole", precio: 800},
  {nombre: "Quesadilla", precio: 900},
  {nombre: "Burrito", precio: 1000},

  // Cócteles
  {nombre: "Mojito", precio: 900},
  {nombre: "Cubalibre", precio: 900},
  {nombre: "Margarita", precio: 1000},
  {nombre: "Ron con frutas", precio: 950},
  {nombre: "Vodka con frutas", precio: 950},
  {nombre: "Whiskey con cola", precio: 1000},
  {nombre: "Tequila Sunrise", precio: 1050},
  {nombre: "Vodka con energydrink", precio: 1050},

  // Alcohol
  {nombre: "Cerveza", precio: 800},
  {nombre: "Tequila", precio: 950},
  {nombre: "Ron", precio: 950},
  {nombre: "Vodka", precio: 950},
  {nombre: "Whiskey", precio: 1000},
  {nombre: "Jagger", precio: 1050},

  // Especiales
  {nombre: "Torito", precio: 1000},
  {nombre: "JaggBomb", precio: 1100},
  {nombre: "Golem", precio: 1100},
  {nombre: "Licor afrodisiaco", precio: 1100}

];

function render() {
  const menu = document.getElementById("menu");
  menu.innerHTML = "";

  items.forEach((item, index) => {
    menu.innerHTML += `
      <div class="item">
        <img src="https://via.placeholder.com/100">
        <h3>${item.nombre}</h3>
        <p>$${item.precio}</p>
        <input type="number" min="0" value="0" onchange="calcular()" id="item-${index}">
      </div>
    `;
  });
}

function calcular() {
  let total = 0;

  items.forEach((item, index) => {
    let cantidad = parseInt(document.getElementById(`item-${index}`).value) || 0;
    total += cantidad * item.precio;
  });

  document.getElementById("total").innerText = "Total: $" + total;
}

function resetear() {
  items.forEach((_, index) => {
    document.getElementById(`item-${index}`).value = 0;
  });
  calcular();
}

render();
</script>

</body>
</html>
